name: Standalone SOT Scraper
on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 02:00 UTC
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permission is mandatory for the "git push" at the end
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: |
          pip install selenium webdriver-manager pandas

      - name: Run SOT Scraper
        # This executes your standalone python file
        run: python sot_scraper.py

      - name: Sync and Push Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Create folder if it doesn't exist to prevent git error
          mkdir -p sot_data
          
          # Stage the changes
          git add sot_data/
          
          # Only commit if there are actually changes in the folder
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-sync SOT stats: $(date +'%Y-%m-%d')"
            git push
          else
            echo "No new data found to commit."
          fi
