name: Standalone SOT Scraper
on:
  schedule:
    - cron: '30 0 * * *' # Runs daily at 00:30 UTC
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  scrape_sot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create and push the new folders/files
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Chrome and Drivers
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager pandas

      - name: Run SOT Scraper
        run: python sot_scraper.py

      - name: Commit and Push SOT Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add sot_data/
          # Only commit if there are actually changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update SOT stats: $(date +'%Y-%m-%d')" && git push)
