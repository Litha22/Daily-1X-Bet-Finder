name: Syndicate Delivery Agent
on:
  schedule:
    - cron: '5 22 * * *'
  workflow_dispatch:

jobs:
  deliver_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          pip install playwright
          playwright install chromium

      - name: Execute Delivery
        run: python scraper.py

      - name: Commit File to Repo
        run: |
          git config --global user.name 'Syndicate-Bot'
          git config --global user.email 'bot@xcott.com'
          # This line now tracks BOTH the latest file and the archive folder
          git add latest_predictions.csv archive/*.csv 
          git commit -m "Data Feed & Archive Updated" || echo "No changes to commit"
          git push
